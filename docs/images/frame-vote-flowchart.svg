<svg xmlns="http://www.w3.org/2000/svg" width="820" height="520" viewBox="0 0 820 520" font-family="system-ui, sans-serif">
  <rect width="820" height="520" fill="#111111"/>
  <text x="410" y="35" fill="#eeeeee" font-size="18" font-weight="700" text-anchor="middle">Per-voiced-frame vote (rule 2)</text>

  <!-- Start -->
  <rect x="290" y="55" width="240" height="55" rx="10" fill="#1c1c1c" stroke="#888888" stroke-width="2"/>
  <text x="410" y="88" fill="#eeeeee" font-size="13" text-anchor="middle">voiced frame: energiesMap</text>

  <!-- Decision 1 -->
  <polygon points="410,135 560,190 410,245 260,190" fill="#1c1c1c" stroke="#e5c07b" stroke-width="2"/>
  <text x="410" y="180" fill="#eeeeee" font-size="12.5" text-anchor="middle">top energy</text>
  <text x="410" y="198" fill="#eeeeee" font-size="12.5" text-anchor="middle">&gt;= minEnergy ?</text>

  <path d="M410,110 L410,135" stroke="#888888" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- No -> unknown (off-screen) -->
  <path d="M260,190 L110,190" stroke="#888888" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="185" y="178" fill="#9aa0a6" font-size="12" text-anchor="middle">no</text>
  <rect x="10" y="163" width="180" height="55" rx="10" fill="#1c1c1c" stroke="#555555" stroke-width="2"/>
  <text x="100" y="196" fill="#cccccc" font-size="13" font-weight="700" text-anchor="middle">'unknown'</text>

  <!-- Yes -> decision 2 -->
  <path d="M410,245 L410,290" stroke="#888888" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="428" y="270" fill="#9aa0a6" font-size="12">yes</text>

  <polygon points="410,290 590,350 410,410 230,350" fill="#1c1c1c" stroke="#e5c07b" stroke-width="2"/>
  <text x="410" y="340" fill="#eeeeee" font-size="12.5" text-anchor="middle">top &gt;= runnerUp</text>
  <text x="410" y="358" fill="#eeeeee" font-size="12.5" text-anchor="middle">* dominanceRatio ?</text>

  <!-- Yes -> topId wins -->
  <path d="M590,350 L720,350" stroke="#888888" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="655" y="338" fill="#9aa0a6" font-size="12" text-anchor="middle">yes</text>
  <rect x="640" y="323" width="160" height="55" rx="10" fill="#1c1c1c" stroke="#e06c75" stroke-width="2"/>
  <text x="720" y="356" fill="#e06c75" font-size="13" font-weight="700" text-anchor="middle">topId wins</text>

  <!-- No -> multiple -->
  <path d="M230,350 L100,350" stroke="#888888" stroke-width="2" marker-end="url(#arrow2)"/>
  <text x="165" y="338" fill="#9aa0a6" font-size="12" text-anchor="middle">no</text>
  <rect x="20" y="323" width="160" height="55" rx="10" fill="#1c1c1c" stroke="#e5c07b" stroke-width="2"/>
  <text x="100" y="356" fill="#e5c07b" font-size="13" font-weight="700" text-anchor="middle">'multiple'</text>

  <text x="410" y="470" fill="#555555" font-size="12" text-anchor="middle">runnerUpEnergy defaults to 0 when only one face is visible, so a lone face always wins outright.</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#888888"/>
    </marker>
  </defs>
</svg>
